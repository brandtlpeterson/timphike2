<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Game | Brandt Peterson</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: #f5f5f5;
        background: #111 url("img/utah-mountains.jpg") no-repeat center center fixed;
        background-size: cover;
      }
      #game-wrapper {
        background-color: rgba(0, 0, 0, 0.75);
        min-height: 100vh;
        padding: 20px;
        text-align: center;
      }
      h1 {
        margin-top: 0;
      }
      canvas {
        background-color: #222;
        border: 2px solid #ffd27f;
        margin-top: 15px;
      }
      #score {
        font-size: 1.2rem;
        margin-top: 10px;
      }
      a {
        color: #ffd27f;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
</head>
<body>
<div id="game-wrapper">
  <h1>Snake Game</h1>
  <p>Use the arrow keys or WASD to control the snake. Try to eat as many apples as you can.</p>
  <p><a href="scratch.html">Back to Scratch Page</a></p>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div id="score">Score: 0</div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const gridSize = 20;
  const tileCount = canvas.width / gridSize;

  let snake = [{ x: 10, y: 10 }];
  let vx = 1;
  let vy = 0;
  let apple = { x: 5, y: 5 };
  let score = 0;
  let gameOver = false;

  document.addEventListener('keydown', handleKey);

  function handleKey(e) {
    switch (e.key) {
      case 'ArrowUp':
      case 'w':
      case 'W':
        if (vy === 1) return;
        vx = 0; vy = -1;
        break;
      case 'ArrowDown':
      case 's':
      case 'S':
        if (vy === -1) return;
        vx = 0; vy = 1;
        break;
      case 'ArrowLeft':
      case 'a':
      case 'A':
        if (vx === 1) return;
        vx = -1; vy = 0;
        break;
      case 'ArrowRight':
      case 'd':
      case 'D':
        if (vx === -1) return;
        vx = 1; vy = 0;
        break;
    }
  }

  function gameLoop() {
    if (gameOver) return;
    update();
    draw();
    setTimeout(gameLoop, 100);
  }

  function update() {
    const head = { x: snake[0].x + vx, y: snake[0].y + vy };

    // Wrap around edges
    if (head.x < 0) head.x = tileCount - 1;
    if (head.x >= tileCount) head.x = 0;
    if (head.y < 0) head.y = tileCount - 1;
    if (head.y >= tileCount) head.y = 0;

    // Self-collision
    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        gameOver = true;
        alert('Game Over! Final score: ' + score);
        return;
      }
    }

    snake.unshift(head);

    // Apple eaten
    if (head.x === apple.x && head.y === apple.y) {
      score++;
      document.getElementById('score').textContent = 'Score: ' + score;
      placeApple();
    } else {
      snake.pop();
    }
  }

  function placeApple() {
    apple.x = Math.floor(Math.random() * tileCount);
    apple.y = Math.floor(Math.random() * tileCount);
  }

  function draw() {
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Snake
    ctx.fillStyle = '#00ff7f';
    snake.forEach(segment => {
      ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
    });

    // Apple
    ctx.fillStyle = '#ff4b4b';
    ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize - 2, gridSize - 2);
  }

  gameLoop();
</script>
</body>
</html>
